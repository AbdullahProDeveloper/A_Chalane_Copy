<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>প্রো সেলস ম্যানেজার | প্রিমিয়াম ইনভয়েস সিস্টেম</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrious/dist/qrious.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f0f4fa 0%, #e8edf5 100%);
            font-family: 'Inter', 'Segoe UI', 'Roboto', sans-serif;
            padding-bottom: 2rem;
        }
        .card-premium {
            background: rgba(255,255,255,0.98);
            border-radius: 28px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(226,232,240,0.8);
        }
        .form-control, .form-select {
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: #2c5f8a;
            box-shadow: 0 0 0 3px rgba(44,95,138,0.1);
        }
        .product-row {
            background: #ffffff;
            border-radius: 20px;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            border: 1px solid #eef2fa;
        }
        .grand-total-card {
            background: linear-gradient(135deg, #f8fafd, #ffffff);
            border-radius: 32px;
            padding: 1rem 2rem;
            border-left: 5px solid #1e4a76;
            font-weight: 700;
            font-size: 1.3rem;
        }
        .btn-rounded {
            border-radius: 44px;
            padding: 0.7rem 1.8rem;
            font-weight: 600;
        }
        .invoice-card {
            background: white;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #e9edf2;
            transition: 0.2s;
        }
        .invoice-card:hover { box-shadow: 0 8px 20px rgba(0,0,0,0.08); transform: translateY(-2px); }
        .action-buttons .btn {
            border-radius: 30px;
            padding: 0.3rem 0.9rem;
            font-size: 0.75rem;
            margin: 0 2px;
        }
        @media (max-width: 768px) {
            .card-premium { padding: 1rem; }
            .grand-total-card { font-size: 1.1rem; padding: 0.8rem 1rem; }
            .action-buttons .btn { padding: 0.25rem 0.7rem; font-size: 0.7rem; }
        }
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            flex-direction: column;
            gap: 15px;
        }
        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #e2e8f0;
            border-top-color: #1e4a76;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { color: white; font-size: 15px; background: rgba(0,0,0,0.6); padding: 6px 20px; border-radius: 40px; }
    </style>
</head>
<body>

<div class="container my-3 my-md-4">
    <div class="no-print mb-4">
        <div class="d-flex justify-content-between align-items-center flex-wrap bg-white p-3 rounded-4 shadow-sm">
            <h3 class="fw-bold text-primary m-0"><i class="fas fa-chart-line"></i> প্রো সেলস ম্যানেজার</h3>
            <span class="badge bg-dark rounded-pill px-3 py-2"><i class="fas fa-cloud-upload-alt"></i> রিয়েল-টাইম</span>
        </div>
    </div>

    <div class="card-premium no-print">
        <h5 class="fw-bold mb-3"><i class="fas fa-store"></i> ক্রেতার তথ্য</h5>
        <div class="row g-3">
            <div class="col-md-6"><label class="fw-semibold">দোকানের নাম *</label><input type="text" id="shopName" class="form-control" value=""></div>
            <div class="col-md-6"><label class="fw-semibold">ক্রেতার নাম</label><input type="text" id="customerName" class="form-control"></div>
            <div class="col-md-6"><label class="fw-semibold">মোবাইল</label><input type="text" id="customerMobile" class="form-control"></div>
            <div class="col-md-6"><label class="fw-semibold">ঠিকানা</label><input type="text" id="customerAddress" class="form-control"></div>
        </div>
    </div>

    <div class="card-premium no-print">
        <div class="row g-3">
            <div class="col-md-4"><label><i class="fas fa-receipt"></i> চালান নং</label><input type="text" id="invoiceNo" class="form-control" readonly style="background:#f1f5f9;"></div>
            <div class="col-md-4"><label><i class="fas fa-hand-holding-usd"></i> পরিশোধ</label><select id="paymentStatus" class="form-select"><option value="ফুল পেইড">✅ ফুল পেইড</option><option value="আংশিক">🔄 আংশিক</option><option value="বাকি">⏳ বাকি</option></select></div>
            <div class="col-md-4"><label><i class="fas fa-mobile-alt"></i> পেমেন্ট মাধ্যম</label><select id="paymentMethod" class="form-select"><option value="বিকাশ">📱 বিকাশ</option><option value="নগদ">📱 নগদ</option><option value="রকেট">🚀 রকেট</option><option value="ব্যাংক">🏦 ব্যাংক</option><option value="নগদ টাকা">💵 নগদ</option><option value="হ্যান্ড ক্যাশ">✋ হ্যান্ড ক্যাশ</option></select></div>
        </div>
    </div>

    <div class="card-premium no-print">
        <div class="d-flex justify-content-between align-items-center mb-3"><h5 class="fw-bold m-0"><i class="fas fa-cubes"></i> পণ্যের বিবরণ</h5><button id="addProduct" class="btn btn-outline-primary rounded-pill btn-sm px-4"><i class="fas fa-plus-circle"></i> পণ্য যোগ</button></div>
        <div id="productList">
            <div class="row product-row align-items-center g-2">
                <div class="col-md-5 col-12"><input type="text" class="form-control productName" placeholder="পণ্যের নাম"></div>
                <div class="col-md-2 col-6"><input type="number" class="form-control productQty" placeholder="পরিমাণ"></div>
                <div class="col-md-2 col-6"><input type="number" class="form-control productPrice" placeholder="দাম (৳)"></div>
                <div class="col-md-2 col-6"><input type="number" class="form-control productTotal" placeholder="মোট" readonly></div>
                <div class="col-md-1 col-6"><button class="btn btn-outline-danger w-100 removeProduct"><i class="fas fa-trash-alt"></i></button></div>
            </div>
        </div>
    </div>

    <div class="card-premium no-print">
        <div class="row g-3">
            <div class="col-md-4"><label><i class="fas fa-tags"></i> ডিসকাউন্ট (৳)</label><input type="number" id="discount" class="form-control"></div>
            <div class="col-md-4"><label><i class="fas fa-percent"></i> ট্যাক্স (%)</label><input type="number" id="tax" class="form-control"></div>
            <div class="col-md-4"><label><i class="fas fa-sticky-note"></i> রিমার্ক</label><input type="text" id="remark" class="form-control"></div>
        </div>
    </div>

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 no-print">
        <div class="grand-total-card"><i class="fas fa-money-bill-wave text-primary"></i> মোট: <span id="grandTotal">0</span> টাকা</div>
        <div><button id="saveInvoice" class="btn btn-success btn-rounded"><i class="fas fa-save"></i> সংরক্ষণ & প্রিন্ট</button></div>
    </div>

    <hr class="my-4 no-print">
    <h4 class="fw-bold mb-3 no-print"><i class="fas fa-history"></i> পূর্ববর্তী ইনভয়েস</h4>
    <div id="invoiceList" class="no-print"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="script.js"></script>
<script src="auto_download.js"></script>
</body>
</html>
